<!doctype html>
<html lang="es">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <title>PROYECTOS DE TÍTULO</title>
        <style>
			*,
*::before,
*::after {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
}

@import url("https://fonts.googleapis.com/css2?family=Source+Code+Pro:ital,wght@0,200..900;1,200..900&display=swap");

:root {
    --color-oscurisimo: hsl(170, 50%, 10%);
    --color-oscuro: hsl(170, 50%, 30%);
    --color-normal: hsl(170, 50%, 50%);
    --color-iluminado: hsl(170, 50%, 70%);
    --color-iluminadisimo: hsl(170, 50%, 90%);
    --fuente: "Source Code Pro", monospace;
}

body {
    font-family: var(--fuente);
    color: var(--color-normal);
    text-align: center;
    font-size: 100%;
}

a {
    color: var(--color-oscuro);
    text-decoration: none;
}

a:hover {
    color: var(--color-oscurisimo);
    text-decoration: underline;
}
div#contenedor {
    margin: 1rem auto;
    width: 90%;
    max-width: 980px;
}

h1 {
    margin: 1rem 0;
    font-weight: 400;
    font-size: calc(100% + 3vw + 3vh);
}

h2 {
    margin: 3rem 0;
    font-weight: 400;
    letter-spacing: 0.25rem;
    font-size: calc(100% + 1vw + 1vh);
    color: var(--color-oscuro);
}

input {
    border: 0.1rem solid var(--color-iluminado);
    padding: 0.5rem 1rem;
    font-family: inherit;
    font-size: 15px;
    color: var(--color-oscuro);
    outline: none;
    margin-bottom: 1.5rem;
    width: 100%;
    display: block;
    background-image: url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" class="bi bi-eye-fill" viewBox="0 0 16 16"><path d="M10.5 8a2.5 2.5 0 1 1-5 0 2.5 2.5 0 0 1 5 0"/><path d="M0 8s3-5.5 8-5.5S16 8 16 8s-3 5.5-8 5.5S0 8 0 8m8 3.5a3.5 3.5 0 1 0 0-7 3.5 3.5 0 0 0 0 7"/></svg>');
    background-repeat: no-repeat;
    background-size: 1rem;
    background-position: 99% center;
}

input::placeholder {
    color: var(--color-iluminado);
}

input:focus {
    border-color: var(--color-normal);
}

div#contenedordetabla {
    overflow-x: auto;
    font-size: 90%;
}

table {
    width: 100%;
    border-collapse: collapse;
    text-align: left;
    margin-bottom: 3rem;
}

thead {
    background: var(--color-iluminadisimo);
    color: var(--color-oscuro);
}

tbody {
    color: var(--color-normal);
}

td,
th {
    border: 1px solid var(--color-normal);
    padding: 0.75rem;
}

th:nth-child(1),
td:nth-child(1),
th:nth-child(4),
td:nth-child(4) {
    text-align: center;
}

td:nth-child(2) {
    color: var(--color-oscuro);
    font-weight: 800;
}

td:nth-child(3) {
    font-style: italic;
}
        </style>
    </head>
    <body>
        <div id="contenedor">
            <h1>"( – ⌓ – )</h1>
            <h2>PROYECTOS DE TÍTULO</h2>

            <input type="text" id="elInput" placeholder="Filtrar electivos…" />
            <div id="contenedordetabla">
                <table>
                    <thead>
                        <tr>
                            <th>Titulad@</th>
                            <th>Proyecto</th>
                            <th>Nota</th>
                            <th>Categoría</th>
							<th>Prof. Guía</th>
                        </tr>
                    </thead>
                    <tbody id="este"></tbody>
                </table>
            </div>
			<?xml version="1.0" encoding="UTF-8"?>

            <small>Diseño y visualización de información</small>
        </div>
		
        <script>
            const t = document.querySelector("#este");
            const URL = "https://api.myjson.online/v1/records/6e9e76db-a1e7-40c5-b18d-4402a31ee935";

            fetch(URL)
                .then((respuesta) => {
                    if (!respuesta.ok) {
                        throw new Error("Error HTTP: " + respuesta.status);
                    }
                    return respuesta.json();
                })
                .then((datos) => {
                    var trabajo = datos.data;
                    console.log(trabajo);
                    trabajo.forEach((x) => {
                        t.innerHTML += `<tr style="${x.ok == 1 ? "background-color: var(--color-iluminadisimo); color: var(--color-oscurisimo)" : ""}"><td>${x.name}</td><td>${x.title}</td><td>${x.grade}</td><td>${x.category}</td><td>${x.tutor}</td></tr>`;
                    });
                })
                .catch((error) => {
                    console.error("Algo salió mal:", error);
                });

            function sinAcentos(str) {
                return str.normalize("NFD").replace(/[\u0300-\u036f]/g, "");
            }

            document.getElementById("elInput").addEventListener("keyup", function () {
                const valor = sinAcentos(this.value.toLowerCase());
                document.querySelectorAll("#este tr").forEach(function (fila) {
                    fila.style.display = sinAcentos(fila.textContent.toLowerCase()).includes(valor) ? "" : "none";
                });
            });
        </script>
    </body>
</html>
